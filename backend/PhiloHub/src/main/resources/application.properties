spring.application.name=PhiloHub

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8081
# Show debug logs for everything
spring.mvc.throw-exception-if-no-handler-found=true
# Spring Security debug logs
logging.level.org.springframework.security=DEBUG

# Spring Web logs
logging.level.org.springframework.web=DEBUG

# JWT Config
jwt.secret=${JWT_SECRET}
jwt.expiration_ms=900000
jwt.refresh_expiration_ms=604800000

# OAuth2 Config
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.facebook.client-id=${FB_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FB_SECRET}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
